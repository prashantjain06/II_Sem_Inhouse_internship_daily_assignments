<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#eaf4ff;
    padding:30px;
}

.container{
    width:90%;
    margin:auto;
}

h2{
    text-align:center;
    color:#003366;
    margin-bottom:20px;
}

.search-box{
    text-align:center;
    margin-bottom:25px;
}

.search-box input{
    width:320px;
    padding:10px;
    border:2px solid #007BFF;
    border-radius:6px;
    font-size:16px;
}

.card-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:250px;
    background:white;
    border-radius:12px;
    box-shadow:0 5px 12px rgba(0,0,0,0.2);
    text-align:center;
    padding:20px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100px;
    height:100px;
    border-radius:50%;
    margin-bottom:15px;
    border:3px solid #007BFF;
}

.card h3{
    color:#003366;
    margin-bottom:15px;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

#details{
    display:none;
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

#details h3{
    color:#003366;
    margin-bottom:15px;
}

</style>
</head>
<body>

<div class="container">

<h2>Student Profile</h2>

<div class="search-box">
<input type="text" id="search" placeholder="Search Student Name" onkeyup="searchStudent()">
</div>

<div class="card-container">

<div class="card">
<h3>Naitik Agarwal</h3>
<button onclick="showDetails('Naitik Agarwal','Data Science','naitik@gmail.com')">
View Profile
</button>
</div>

<div class="card">
<h3>Pranay Jhanwar</h3>
<button onclick="showDetails('Pranay Jhanwar','Data Science','pranay12@gmail.com')">
View Profile
</button>
</div>

<div class="card">
<h3>Parth Saraswat</h3>
<button onclick="showDetails('Parth Saraswat','Data Science','parth23@gmail.com')">
View Profile
</button>
</div>

<div class="card">
<h3>Tanuj Mishra</h3>
<button onclick="showDetails('Tanuj Mishra','Data Science','tanuj45@gmail.com')">
View Profile
</button>
</div>

</div>

<div id="details">
<h3>Student Information</h3>

<p><b>Name :</b> <span id="name"></span></p>
<p><b>Branch :</b> <span id="branch"></span></p>
<p><b>Email :</b> <span id="email"></span></p>

</div>

</div>

<script>

function showDetails(name,branch,email){

document.getElementById("details").style.display="block";

document.getElementById("name").innerHTML=name;
document.getElementById("branch").innerHTML=branch;
document.getElementById("email").innerHTML=email;

}

function searchStudent(){

let input=document.getElementById("search").value.toUpperCase();

let cards=document.getElementsByClassName("card");

for(let i=0;i<cards.length;i++){

let name=cards[i].getElementsByTagName("h3")[0].innerText;

if(name.toUpperCase().indexOf(input)>-1){

cards[i].style.display="block";

}
else{

cards[i].style.display="none";

}

}

}

</script>

</body>
</html>
